const MULT={F:1.018,KMB:1.006,KO:.997,O:1.011,PFE:.992,T:.989,ABT:1.004,CVX:1.017,SCHD:1.002,TROW:.995,SPY:1.003,QQQ:1.006,DIA:1.001,SPYI:1.002,BND:1.001};let page='dashboard',mode='live',quotes={},quoteStatus='Static overlay';const pages=[['dashboard','Dashboard','Front door to the experiment.'],['performance','Performance','Where returns came from.'],['holdings','Holdings','What the portfolio owns today.'],['calls','Covered Calls','Open calls and options history.'],['history','Strategy History','What the experiment has learned.'],['universe','Investment Universe','Portfolio lifecycle and classifications.'],['benchmarks','Benchmark Comparison','Strategy versus realistic alternatives.'],['ledger','Ledger','Source-of-truth event log.'],['import','Monthly Refresh','How the experiment gets updated.'],['methodology','Methodology','Assumptions, constraints, and rules.']];const market=new Set(['dashboard','holdings','calls','benchmarks']);
const fmt=v=>(v||0).toLocaleString(undefined,{style:'currency',currency:'USD',maximumFractionDigits:0}),pct=v=>((v||0).toFixed(2)+'%'),cls=v=>(v||0)>=0?'good':'bad';function tip(t,b){return `<span class="info" tabindex="0">ⓘ<span class="tip"><b>${t}</b><br>${b}</span></span>`}function quote(t,p){return mode==='live'&&quotes[t]?.price?quotes[t].price:(mode==='live'?(p||0)*(MULT[t]||1):p)}function holdingRows(){return DATA.holdings.map(h=>{let price=quote(h.ticker,h.price),value=price*h.shares,gl=value-h.cost;return{...h,price,value,stock_gl:gl,sinceBaseline:value-h.value}})}function combined(){if(mode==='baseline')return DATA.combined;let hs=holdingRows(),stock_val=hs.reduce((s,h)=>s+h.value,0),stock_gl=hs.reduce((s,h)=>s+h.stock_gl,0),total=stock_val+DATA.combined.cash+DATA.combined.opt_val,ret=stock_gl+DATA.combined.premiums+DATA.combined.dividends+DATA.combined.interest+DATA.combined.realized_sale_gains-DATA.combined.fees;return{...DATA.combined,stock_val,stock_gl,total,strategy_total_return:ret,strategy_return_pct:ret/DATA.combined.return_baseline*100}}function expDate(t){let m=(t||'').match(/([A-Z][A-Z]{2})\s+(\d{1,2}),\s+(\d{4})/);return m?new Date(`${m[1]} ${m[2]}, ${m[3]} UTC`):null}function days(exp){let e=expDate(exp);if(!e)return null;let d=mode==='live'?new Date():new Date(DATA.asOf+'T00:00:00Z');return Math.ceil((e-d)/86400000)}async function refreshLive(){quoteStatus='Refreshing quotes…';render();try{let syms=[...new Set([...DATA.holdings.map(h=>h.ticker),...DATA.options.map(o=>o.ticker),...DATA.benchmarkSnapshots.map(b=>b.ticker),...DATA.universe.map(u=>u.ticker),'BND'])].filter(t=>!['HYSA','TBILL3M','60/40','CPI'].includes(t));let url='https://query1.finance.yahoo.com/v7/finance/quote?symbols='+encodeURIComponent(syms.join(','));let r=await fetch(url,{cache:'no-store'});let j=await r.json();quotes={};(j.quoteResponse?.result||[]).forEach(x=>{let p=x.regularMarketPrice??x.postMarketPrice??x.preMarketPrice??x.previousClose;if(x.symbol&&p)quotes[x.symbol]={price:p}});quoteStatus='Live quotes loaded · '+new Date().toLocaleString();mode='live'}catch(e){quoteStatus='Quote fetch unavailable · using static overlay';mode='live'}render()}function nav(){document.getElementById('nav').innerHTML=pages.map(p=>`<button class="${page===p[0]?'active':''}" onclick="page='${p[0]}';render()">${p[1]}</button>`).join('')}function modeUI(){let el=document.getElementById('modeToggle');if(!market.has(page)){el.innerHTML='';return}el.innerHTML=`<span class="quoteStatus">${quoteStatus}</span><button class="refreshLive" onclick="refreshLive()">Refresh Live Data</button><button class="${mode==='live'?'active':''}" onclick="mode='live';render()">Live</button><button class="${mode==='baseline'?'active':''}" onclick="mode='baseline';render()">Baseline</button>`}function banner(){return market.has(page)?`<div class="liveHint"><b>${mode==='live'?'Live mode':'Baseline mode'}:</b> ${mode==='live'?'Quote-sensitive values use current/latest available quotes when available, with static fallback.':'Frozen official snapshot as of '+DATA.asOf+'.'}</div>`:''}function metric(l,v,k=''){return`<section class="card"><div class="label">${l}</div><div class="value ${k}">${v}</div></section>`}function bucket(b){return`<span class="pill">${b}</span>`}

function benchRows(){let c=combined();let strategy={ticker:'STRATEGY',name:'Our Strategy',proxy:'Active portfolio',category:'Cash Flow',purpose:'Maximize sustainable cash flow',baselineInvestment:DATA.combined.return_baseline,priceReturnDollars:c.stock_gl,incomeGenerated:DATA.combined.premiums+DATA.combined.dividends+DATA.combined.interest,totalReturnDollars:c.strategy_total_return,totalReturnPct:c.strategy_return_pct,endingValue:c.total};let rows=[strategy,...DATA.benchmarkSnapshots.map(b=>{let x={...b};if(mode==='live'){let mult=MULT[x.ticker]||1;x.priceReturnDollars=(x.priceReturnDollars||0)*mult;x.totalReturnDollars=x.priceReturnDollars+(x.incomeGenerated||0);x.totalReturnPct=x.totalReturnDollars/x.baselineInvestment*100;x.endingValue=x.baselineInvestment+x.totalReturnDollars}return x})];let base=DATA.combined.return_baseline;let bnd={ticker:'BND',name:'Total Bond Market',proxy:'BND',category:'Capital Preservation',purpose:'Broad bond market',baselineInvestment:base,priceReturnDollars:1145,incomeGenerated:230,totalReturnDollars:1375,totalReturnPct:1375/base*100,endingValue:base+1375};let hysa={ticker:'HYSA',name:'High-Yield Savings',proxy:'Cash',category:'Capital Preservation',purpose:'Cash preservation',baselineInvestment:base,priceReturnDollars:0,incomeGenerated:797,totalReturnDollars:797,totalReturnPct:797/base*100,endingValue:base+797};let tb={ticker:'TBILL3M',name:'3-Month T-Bills',proxy:'Treasury bills',category:'Capital Preservation',purpose:'Short-term Treasury income',baselineInvestment:base,priceReturnDollars:0,incomeGenerated:891,totalReturnDollars:891,totalReturnPct:891/base*100,endingValue:base+891};let sf={ticker:'60/40',name:'60/40 Portfolio',proxy:'60% SPY / 40% BND',category:'Traditional Retirement',purpose:'Traditional retirement allocation',baselineInvestment:base,priceReturnDollars:3578,incomeGenerated:338,totalReturnDollars:3916,totalReturnPct:3916/base*100,endingValue:base+3916};let cpi={ticker:'CPI',name:'Inflation / CPI',proxy:'CPI',category:'Purchasing Power',purpose:'Purchasing power hurdle',baselineInvestment:base,priceReturnDollars:562,incomeGenerated:0,totalReturnDollars:562,totalReturnPct:562/base*100,endingValue:base+562};rows.push(bnd,hysa,tb,sf,cpi);return rows.map(r=>['SPYI','SCHD'].includes(r.ticker)?{...r,category:'Cash Flow'}:['SPY','QQQ','DIA'].includes(r.ticker)?{...r,category:'Growth'}:r)}function benchmarksPage(){let cats=['Cash Flow','Growth','Capital Preservation','Traditional Retirement','Purchasing Power'],rows=benchRows();return`${banner()}<div class="stack"><section class="hero"><div class="label">Retirement Benchmark Framework</div><div style="font-size:18px;font-weight:800;margin-top:8px">Cash flow first. Capital preservation second. Growth above inflation third.</div></section>${cats.map(cat=>`<section class="card"><div class="label">${cat}</div><table><thead><tr><th>Portfolio</th><th>Purpose</th><th class="num">Capital Appreciation</th><th class="num">Income Generated</th><th class="num">Total Return</th><th class="num">Return %</th><th class="num">Ending Value</th></tr></thead><tbody>${rows.filter(r=>r.category===cat).map(r=>`<tr><td class="ticker">${r.name}<div class="small">${r.proxy||r.ticker}</div></td><td>${r.purpose}</td><td class="num ${cls(r.priceReturnDollars)}">${fmt(r.priceReturnDollars)}</td><td class="num good">${fmt(r.incomeGenerated)}</td><td class="num ${cls(r.totalReturnDollars)}"><b>${fmt(r.totalReturnDollars)}</b></td><td class="num ${cls(r.totalReturnPct)}">${pct(r.totalReturnPct)}</td><td class="num">${fmt(r.endingValue)}</td></tr>`).join('')}</tbody></table></section>`).join('')}</div>`}

function methodology(){return`<div class="stack"><section class="card"><div class="label">Purpose</div><p>The purpose of this experiment is to evaluate whether a strategically selected portfolio of dividend-paying companies, enhanced through covered-call writing, can produce superior long-term cash generation while remaining competitive with passive investment alternatives.</p></section><section class="card"><div class="label">Priority System</div><ol><li><b>Cash Flow</b> — generate sustainable income from premiums, dividends, and interest.</li><li><b>Capital Preservation</b> — protect the underlying portfolio.</li><li><b>Real Growth</b> — grow purchasing power above inflation.</li></ol></section><section class="card"><div class="label">Account Structure</div><p>This experiment is conducted inside tax-advantaged retirement accounts. Performance is reported pre-tax. Taxes, wash-sale rules, tax lots, and after-tax returns are outside scope for this phase.</p></section><section class="card"><div class="label">Initial Capital Constraints</div><p>The experiment began with approximately $75,000 across two separate retirement accounts. Because covered calls require 100-share lots, the initial portfolio could not always purchase the highest-conviction companies. As capital grows, the investment universe expands.</p></section><section class="card"><div class="label">Live vs Baseline</div><p>Baseline is the official frozen experiment record. Live mode is a quote-driven overlay plus ledger entries after the baseline. The ledger remains the source of truth.</p></section></div>`}
