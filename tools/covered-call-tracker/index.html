<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Covered Call Strategy Tracker | The Math Doesn't Lie</title>
  <style>
    :root{--bg:#0b1020;--panel:#11182b;--panel2:#16213a;--ink:#eef3ff;--muted:#95a3bd;--line:#26334f;--good:#31d47a;--bad:#ff6b6b;--warn:#ffd166;--accent:#7c9cff;--chip:#202b47;--shadow:0 12px 32px rgba(0,0,0,.28)}
    *{box-sizing:border-box}body{margin:0;background:radial-gradient(1200px 700px at 20% -10%,#17213b,transparent),var(--bg);color:var(--ink);font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial}.app{display:grid;grid-template-columns:260px 1fr;min-height:100vh}aside{border-right:1px solid var(--line);padding:22px;background:rgba(7,12,25,.7);position:sticky;top:0;height:100vh}.brand{font-size:22px;font-weight:900}.tag{color:var(--muted);font-size:13px;margin:6px 0 20px}.nav button{display:block;width:100%;text-align:left;border:0;background:transparent;color:var(--muted);padding:11px 12px;border-radius:12px;cursor:pointer;font-weight:700}.nav button.active,.nav button:hover{background:var(--chip);color:var(--ink)}main{padding:28px 34px 48px}.topbar{display:flex;gap:16px;align-items:center;justify-content:space-between;margin-bottom:18px}h1{margin:0;font-size:28px}.subtitle{color:var(--muted);font-size:13px;margin-top:4px}.grid{display:grid;gap:16px}.cards{grid-template-columns:repeat(4,minmax(0,1fr))}.two{grid-template-columns:1.2fr .8fr}.three{grid-template-columns:repeat(3,1fr)}.card,.hero{background:linear-gradient(180deg,var(--panel),#0f172a);border:1px solid var(--line);border-radius:18px;padding:18px;box-shadow:var(--shadow)}.hero{background:linear-gradient(135deg,#17213b,#101827 60%,#0d1426)}.label{color:var(--muted);text-transform:uppercase;font-size:12px;letter-spacing:.11em;font-weight:900}.value{font-size:34px;font-weight:900;margin-top:8px}.small{font-size:12px;color:var(--muted)}.good{color:var(--good)}.bad{color:var(--bad)}.warn{color:var(--warn)}table{width:100%;border-collapse:collapse;margin-top:10px}th,td{border-bottom:1px solid var(--line);padding:10px 8px;text-align:left;font-size:13px;vertical-align:top}th{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.09em}.num{text-align:right;white-space:nowrap}.ticker{font-weight:900}.note,.liveHint{border:1px solid rgba(124,156,255,.35);background:rgba(124,156,255,.08);border-radius:14px;padding:12px 14px;color:#dbeafe;font-size:13px;line-height:1.45;margin-bottom:16px}.modeToggle{display:flex;gap:6px;align-items:center;justify-content:flex-end;margin-left:auto;flex-wrap:wrap}.modeToggle button{border:1px solid var(--line);background:var(--chip);color:var(--muted);border-radius:999px;padding:8px 12px;font-weight:800;cursor:pointer}.modeToggle button.active{background:linear-gradient(180deg,#6d8dff,#5578eb);color:white;border-color:#7c9cff}.refreshLive{border:1px solid rgba(124,156,255,.5)!important;background:rgba(124,156,255,.14)!important;color:#dbeafe!important}.quoteStatus{font-size:12px;color:var(--muted);padding:6px 10px;border:1px solid var(--line);border-radius:999px;background:var(--chip)}.stack{display:grid;gap:16px}.pill{display:inline-block;padding:4px 8px;border-radius:999px;background:var(--chip);color:var(--ink);font-size:12px;font-weight:800}.barrow{display:grid;grid-template-columns:150px 1fr 80px;gap:10px;align-items:center;margin:10px 0}.bar{height:10px;background:#0b1225;border-radius:999px;overflow:hidden}.bar span{display:block;height:100%;background:#7c9cff}@media(max-width:900px){.app{grid-template-columns:1fr}aside{position:relative;height:auto}.cards,.two,.three{grid-template-columns:1fr}main{padding:20px}table{display:block;overflow-x:auto}}
  </style>
</head>
<body>
<div class="app"><aside><div class="brand">Finance Tracker V2.3</div><div class="tag">Cash flow. Capital preservation. Real growth.</div><div class="nav" id="nav"></div></aside><main><div class="topbar"><div><h1 id="title"></h1><div class="subtitle" id="sub"></div></div><div class="modeToggle" id="modeToggle"></div></div><section id="view"></section></main></div>
<script>
const DATA={asOf:'2026-06-30',baseline:75000,cash:2400,premiums:3042,dividends:412,interest:18,fees:12,realized:0,holdings:[
{account:'Sean',ticker:'F',name:'Ford',sector:'Consumer Discretionary',bucket:'Review',shares:100,price:11.20,cost:1180},
{account:'Sean',ticker:'KMB',name:'Kimberly-Clark',sector:'Consumer Staples',bucket:'Core',shares:100,price:141.50,cost:13800},
{account:'Sean',ticker:'KO',name:'Coca-Cola',sector:'Consumer Staples',bucket:'Core',shares:100,price:78.16,cost:7816},
{account:'Sean',ticker:'O',name:'Realty Income',sector:'Real Estate',bucket:'Core',shares:100,price:57.40,cost:5750},
{account:'Sean',ticker:'PFE',name:'Pfizer',sector:'Healthcare',bucket:'Review',shares:200,price:24.08,cost:5580},
{account:'Sean',ticker:'T',name:'AT&T',sector:'Communication Services',bucket:'Review',shares:100,price:21.80,cost:2350},
{account:'Maeve',ticker:'ABT',name:'Abbott Labs',sector:'Healthcare',bucket:'Core',shares:100,price:103.20,cost:10100},
{account:'Maeve',ticker:'CVX',name:'Chevron',sector:'Energy',bucket:'Core',shares:100,price:156.90,cost:15350},
{account:'Maeve',ticker:'SCHD',name:'SCHD',sector:'ETF',bucket:'Benchmark',shares:300,price:26.10,cost:7800},
{account:'Maeve',ticker:'TROW',name:'T. Rowe Price',sector:'Financials',bucket:'Core',shares:100,price:112.40,cost:11000}],
options:[{ticker:'KO',desc:'KO Jul 19 80 Call',expiration:'Jul 19 2026',strike:80,premium:96},{ticker:'O',desc:'O Jul 19 60 Call',expiration:'Jul 19 2026',strike:60,premium:34},{ticker:'PFE',desc:'PFE Jul 19 27 Call',expiration:'Jul 19 2026',strike:27,premium:55},{ticker:'CVX',desc:'CVX Jul 26 165 Call',expiration:'Jul 26 2026',strike:165,premium:121}],
benchmarks:[{ticker:'SPY',name:'S&P 500',category:'Growth',purpose:'Broad market growth',start:75000,priceReturn:5200,income:410},{ticker:'QQQ',name:'Nasdaq 100',category:'Growth',purpose:'Growth stocks',start:75000,priceReturn:7800,income:120},{ticker:'DIA',name:'Dow',category:'Growth',purpose:'Blue-chip index',start:75000,priceReturn:4100,income:360},{ticker:'SCHD',name:'SCHD',category:'Cash Flow',purpose:'Dividend growth ETF',start:75000,priceReturn:3300,income:760},{ticker:'SPYI',name:'SPYI',category:'Cash Flow',purpose:'Covered-call ETF',start:75000,priceReturn:2900,income:1320},{ticker:'BND',name:'Total Bond Market',category:'Capital Preservation',purpose:'Broad bond market',start:75000,priceReturn:1145,income:230},{ticker:'HYSA',name:'High-Yield Savings',category:'Capital Preservation',purpose:'Cash preservation',start:75000,priceReturn:0,income:797},{ticker:'TBILL3M',name:'3-Month T-Bills',category:'Capital Preservation',purpose:'Short-term Treasury income',start:75000,priceReturn:0,income:891},{ticker:'60/40',name:'60/40 Portfolio',category:'Traditional Retirement',purpose:'Traditional retirement allocation',start:75000,priceReturn:3578,income:338},{ticker:'CPI',name:'Inflation / CPI',category:'Purchasing Power',purpose:'Purchasing power hurdle',start:75000,priceReturn:562,income:0}],
ledger:[['2026-03-31','Sean','BUY','PFE','Bought 200 shares @ 27.90',-5580],['2026-03-31','Sean','SELL CALL','PFE','Sold May 30 calls',36.65],['2026-05-04','Sean','SELL CALL','PFE','Sold Jun 27 calls',72.65],['2026-06-17','Sean','SELL CALL','PFE','Sold Jul 27 calls',54.65]]};
const MULT={F:1.018,KMB:1.006,KO:.997,O:1.011,PFE:.992,T:.989,ABT:1.004,CVX:1.017,SCHD:1.002,TROW:.995,SPY:1.003,QQQ:1.006,DIA:1.001,SPYI:1.002,BND:1.001};
let page='dashboard',mode='live',quotes={},quoteStatus='Static overlay';
const pages=[['dashboard','Dashboard','Front door to the experiment.'],['holdings','Holdings','What the portfolio owns today.'],['calls','Covered Calls','Open calls and options history.'],['benchmarks','Benchmark Comparison','Strategy versus realistic alternatives.'],['ledger','Ledger','Source-of-truth event log.'],['methodology','Methodology','Assumptions, constraints, and rules.']];
const market=new Set(['dashboard','holdings','calls','benchmarks']);
const fmt=v=>(v||0).toLocaleString(undefined,{style:'currency',currency:'USD',maximumFractionDigits:0});const pct=v=>((v||0).toFixed(2)+'%');const cls=v=>(v||0)>=0?'good':'bad';
function quote(t,p){return mode==='live'&&quotes[t]?.price?quotes[t].price:(mode==='live'?(p||0)*(MULT[t]||1):p)}
function holdings(){return DATA.holdings.map(h=>{let price=quote(h.ticker,h.price),value=price*h.shares,gl=value-h.cost;return{...h,price,value,gl,delta:value-h.price*h.shares}})}
function combined(){let hs=holdings(),stock=hs.reduce((s,h)=>s+h.value,0),gl=hs.reduce((s,h)=>s+h.gl,0),income=DATA.premiums+DATA.dividends+DATA.interest,ret=gl+income+DATA.realized-DATA.fees;return{stock,gl,income,total:stock+DATA.cash,ret,retPct:ret/DATA.baseline*100}}
function benchmarks(){let c=combined(),strategy={ticker:'STRATEGY',name:'Our Strategy',category:'Cash Flow',purpose:'Maximize sustainable cash flow',start:DATA.baseline,priceReturn:c.gl,income:DATA.premiums+DATA.dividends+DATA.interest};return[strategy,...DATA.benchmarks].map(b=>{let pr=b.priceReturn,inc=b.income,total=pr+inc;if(mode==='live'&&['SPY','QQQ','DIA','SPYI','SCHD','BND'].includes(b.ticker)){pr*=MULT[b.ticker]||1;total=pr+inc}return{...b,priceReturn:pr,income:inc,total,totalPct:total/b.start*100,end:b.start+total}})}
async function refreshLive(){quoteStatus='Refreshing quotes…';render();try{let syms=[...new Set([...DATA.holdings.map(h=>h.ticker),...DATA.benchmarks.map(b=>b.ticker).filter(t=>!['HYSA','TBILL3M','60/40','CPI'].includes(t))])];let url='https://query1.finance.yahoo.com/v7/finance/quote?symbols='+encodeURIComponent(syms.join(','));let r=await fetch(url,{cache:'no-store'});let j=await r.json();quotes={};(j.quoteResponse?.result||[]).forEach(x=>{if(x.symbol&&x.regularMarketPrice)quotes[x.symbol]={price:x.regularMarketPrice}});quoteStatus='Live quotes loaded · '+new Date().toLocaleString();mode='live'}catch(e){quoteStatus='Quote fetch unavailable · using static overlay';mode='live'}render()}
function nav(){document.getElementById('nav').innerHTML=pages.map(p=>`<button class="${page===p[0]?'active':''}" onclick="page='${p[0]}';render()">${p[1]}</button>`).join('')}
function modeUI(){let el=document.getElementById('modeToggle');if(!market.has(page)){el.innerHTML='';return}el.innerHTML=`<span class="quoteStatus">${quoteStatus}</span><button class="refreshLive" onclick="refreshLive()">Refresh Live Data</button><button class="${mode==='live'?'active':''}" onclick="mode='live';render()">Live</button><button class="${mode==='baseline'?'active':''}" onclick="mode='baseline';render()">Baseline</button>`}
function banner(){return market.has(page)?`<div class="liveHint"><b>${mode==='live'?'Live mode':'Baseline mode'}:</b> ${mode==='live'?'Quote-sensitive values use current/latest available quotes when available, with static fallback.':'Frozen official snapshot as of '+DATA.asOf+'.'}</div>`:''}
function metric(label,value,klass=''){return`<section class="card"><div class="label">${label}</div><div class="value ${klass}">${value}</div></section>`}
function dashboard(){let c=combined(),pulse=benchmarks().filter(b=>['SPY','QQQ','DIA'].includes(b.ticker));return`${banner()}<div class="stack"><section class="hero"><div class="label">Strategy Overview</div><div style="font-size:20px;font-weight:800;margin-top:8px;line-height:1.35">A strategic sector-balanced portfolio of blue chip dividend-paying stocks, enhanced through covered calls, with performance compared to income vehicles, traditional benchmarks, safe assets, and inflation.</div><div class="small" style="margin-top:12px">Data. Models. Assumptions. You decide.</div></section><div class="grid two"><section class="hero"><div class="label">${mode==='live'?'Live Strategy Value':'Since Inception Performance'}</div><div class="value ${cls(c.ret)}">${fmt(c.ret)} <span style="font-size:28px">(${pct(c.retPct)})</span></div><div class="small">Primary objective: cash flow, followed by capital preservation, followed by growth above inflation.</div></section><section class="card"><div class="label">Market Pulse</div>${pulse.map(m=>`<div style="display:flex;justify-content:space-between;margin:10px 0"><span>${m.name}</span><b class="${cls(m.totalPct)}">${pct(m.totalPct)}</b></div>`).join('')}</section></div><div class="grid cards">${metric('Portfolio Value',fmt(c.total))}${metric('Cash',fmt(DATA.cash))}${metric('Premium Income',fmt(DATA.premiums),'good')}${metric('Dividends + Interest',fmt(DATA.dividends+DATA.interest),'good')}</div></div>`}
function holdingsPage(){let hs=holdings(),c=combined();return`${banner()}<div class="stack"><div class="grid three">${metric('Stock Value',fmt(c.stock))}${metric('Cash',fmt(DATA.cash))}${metric('Unrealized Stock G/L',fmt(c.gl),cls(c.gl))}</div><section class="card"><div class="label">${mode==='live'?'Live holdings':'Baseline holdings'}</div><table><thead><tr><th>Account</th><th>Ticker</th><th>Sector</th><th>Bucket</th><th class="num">Shares</th><th class="num">Price</th><th class="num">Value</th><th class="num">Stock G/L</th><th class="num">Since baseline</th></tr></thead><tbody>${hs.map(h=>`<tr><td>${h.account}</td><td class="ticker">${h.ticker}</td><td>${h.sector}</td><td><span class="pill">${h.bucket}</span></td><td class="num">${h.shares}</td><td class="num">${fmt(h.price)}</td><td class="num">${fmt(h.value)}</td><td class="num ${cls(h.gl)}">${fmt(h.gl)}</td><td class="num ${cls(h.delta)}">${mode==='live'?fmt(h.delta):'—'}</td></tr>`).join('')}</tbody></table></section></div>`}
function expDate(t){let m=t.match(/([A-Z][a-z]{2})\s+(\d{1,2})\s+(\d{4})/);return m?new Date(`${m[1]} ${m[2]}, ${m[3]} UTC`):null}
function callsPage(){let prices=Object.fromEntries(holdings().map(h=>[h.ticker,h.price])),today=mode==='live'?new Date():new Date(DATA.asOf+'T00:00:00Z');let rows=DATA.options.map(o=>{let e=expDate(o.expiration),days=e?Math.ceil((e-today)/86400000):null,price=prices[o.ticker],dist=price?((o.strike-price)/price*100):null;return{...o,days,price,dist}}).sort((a,b)=>(a.days??999)-(b.days??999));return`${banner()}<section class="card"><div class="label">Open covered calls</div><table><thead><tr><th>Ticker</th><th>Contract</th><th>Expiration</th><th class="num">Days to Expiration</th><th class="num">Strike</th><th class="num">Stock Price</th><th class="num">Distance to Strike</th></tr></thead><tbody>${rows.map(o=>`<tr><td class="ticker">${o.ticker}</td><td>${o.desc}</td><td>${o.expiration}</td><td class="num">${o.days??'—'}</td><td class="num">$${o.strike}</td><td class="num">${fmt(o.price)}</td><td class="num ${cls(o.dist)}">${pct(o.dist)}</td></tr>`).join('')}</tbody></table></section>`}
function benchmarksPage(){let rows=benchmarks(),cats=['Cash Flow','Growth','Capital Preservation','Traditional Retirement','Purchasing Power'];return`${banner()}<div class="stack"><section class="hero"><div class="label">Retirement Benchmark Framework</div><div style="font-size:18px;font-weight:800;margin-top:8px">Cash flow first. Capital preservation second. Growth above inflation third.</div></section>${cats.map(cat=>`<section class="card"><div class="label">${cat}</div><table><thead><tr><th>Portfolio</th><th>Purpose</th><th class="num">Capital Appreciation</th><th class="num">Income Generated</th><th class="num">Total Return</th><th class="num">Return %</th><th class="num">Ending Value</th></tr></thead><tbody>${rows.filter(r=>r.category===cat).map(r=>`<tr><td class="ticker">${r.name}<div class="small">${r.ticker}</div></td><td>${r.purpose}</td><td class="num ${cls(r.priceReturn)}">${fmt(r.priceReturn)}</td><td class="num good">${fmt(r.income)}</td><td class="num ${cls(r.total)}"><b>${fmt(r.total)}</b></td><td class="num ${cls(r.totalPct)}">${pct(r.totalPct)}</td><td class="num">${fmt(r.end)}</td></tr>`).join('')}</tbody></table></section>`).join('')}</div>`}
function ledgerPage(){return`<section class="card"><div class="label">Ledger</div><p class="small">No Live/Baseline toggle. The ledger is the source-of-truth event log.</p><table><thead><tr><th>Date</th><th>Account</th><th>Action</th><th>Symbol</th><th>Description</th><th class="num">Amount</th></tr></thead><tbody>${DATA.ledger.map(t=>`<tr><td>${t[0]}</td><td>${t[1]}</td><td>${t[2]}</td><td class="ticker">${t[3]}</td><td>${t[4]}</td><td class="num ${cls(t[5])}">${fmt(t[5])}</td></tr>`).join('')}</tbody></table></section>`}
function methodology(){return`<div class="stack"><section class="card"><div class="label">Purpose</div><p>The purpose of this experiment is to evaluate whether a strategically selected portfolio of high-quality dividend-paying companies, enhanced through covered-call writing, can produce superior long-term cash generation while remaining competitive with passive investment alternatives.</p></section><section class="card"><div class="label">Priority System</div><ol><li><b>Cash Flow</b> — generate sustainable income from premiums, dividends, and interest.</li><li><b>Capital Preservation</b> — protect the underlying portfolio.</li><li><b>Real Growth</b> — grow purchasing power above inflation.</li></ol></section><section class="card"><div class="label">Account Structure</div><p>This experiment is conducted inside tax-advantaged retirement accounts. Performance is reported pre-tax. Taxes, wash-sale rules, tax lots, and after-tax returns are outside scope for this phase.</p></section><section class="card"><div class="label">Initial Capital Constraints</div><p>The experiment began with approximately $75,000 across two separate retirement accounts. Because covered calls require 100-share lots, the initial portfolio could not always purchase the highest-conviction companies. As capital grows, the investment universe expands.</p></section></div>`}
function render(){nav();modeUI();let p=pages.find(x=>x[0]===page);document.getElementById('title').textContent=p[1];document.getElementById('sub').textContent=p[2];let html={dashboard:dashboard(),holdings:holdingsPage(),calls:callsPage(),benchmarks:benchmarksPage(),ledger:ledgerPage(),methodology:methodology()}[page];document.getElementById('view').innerHTML=html}render();
</script>
</body>
</html>
